<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さんすうドリル</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, forwardRef, useImperativeHandle } = React;

    // --- アイコンコンポーネント (lucide-reactの代わり) ---
    const Star = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    );
    const ArrowLeft = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
    );
    const Circle = ({ className, strokeWidth }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/></svg>
    );
    const X = ({ className, strokeWidth }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth || 2} strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    );
    const Award = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
    );
    const Undo = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
    );
    const Heart = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    );

    // --- Gemini API 連携用の設定と関数 ---
    const apiKey = ""; // 実行環境で自動的に設定されます

    const fetchGeminiContent = async (prompt, systemPrompt) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
      };
      if (systemPrompt) {
        payload.systemInstruction = { parts: [{ text: systemPrompt }] };
      }
      
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error('API request failed');
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "うまく こたえられなかったみたい。";
        } catch (error) {
          await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
        }
      }
      return "AIせんせいが おやすみ中みたい。あとでためしてね！";
    };
    // -------------------------------------

    // ピンポン音を鳴らす関数
    const playCorrectSound = () => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880, ctx.currentTime); 
        gain1.gain.setValueAtTime(0.3, ctx.currentTime);
        gain1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(ctx.currentTime);
        osc1.stop(ctx.currentTime + 0.3);

        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(659.25, ctx.currentTime + 0.15); 
        gain2.gain.setValueAtTime(0.3, ctx.currentTime + 0.15);
        gain2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(ctx.currentTime + 0.15);
        osc2.stop(ctx.currentTime + 0.45);
      } catch (e) {
        console.log('Audio error:', e);
      }
    };

    // 紙吹雪アニメーションコンポーネント
    const Confetti = () => {
      const colors = ['#f87171', '#60a5fa', '#34d399', '#fbbf24', '#a78bfa'];
      const pieces = Array.from({ length: 60 }).map((_, i) => ({
        id: i,
        left: `${Math.random() * 100}%`,
        animationDelay: `${1 + Math.random() * 2}s`, 
        backgroundColor: colors[Math.floor(Math.random() * colors.length)],
        transform: `rotate(${Math.random() * 360}deg)`,
      }));

      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden z-50">
          <style>{`
            @keyframes fall {
              0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
              100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
            }
            .confetti-piece {
              position: absolute;
              top: -20px;
              width: 12px;
              height: 12px;
              opacity: 0;
              animation: fall 3s linear forwards;
            }
          `}</style>
          {pieces.map(p => (
            <div
              key={p.id}
              className="confetti-piece rounded-sm"
              style={{
                left: p.left,
                backgroundColor: p.backgroundColor,
                animationDelay: p.animationDelay,
              }}
            />
          ))}
        </div>
      );
    };

    // くす玉アニメーションコンポーネント
    const Kusudama = ({ onClick }) => {
      return (
        <div 
          className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 backdrop-blur-sm animate-in fade-in duration-500 cursor-pointer"
          onClick={onClick}
        >
          <Confetti />
          <div className="relative flex flex-col items-center -mt-40">
            <style>{`
              @keyframes swing {
                0% { transform: rotate(0deg); }
                20% { transform: rotate(15deg); }
                40% { transform: rotate(-10deg); }
                60% { transform: rotate(5deg); }
                80% { transform: rotate(-2deg); }
                100% { transform: rotate(0deg); }
              }
              @keyframes open-left {
                100% { transform: rotate(-60deg); opacity: 0;}
              }
              @keyframes open-right {
                100% { transform: rotate(60deg); opacity: 0;}
              }
              @keyframes drop {
                0% { height: 0; }
                80% { height: 260px; }
                90% { height: 230px; }
                100% { height: 240px; }
              }
              .kusudama-container { animation: swing 1s ease-in-out; transform-origin: top center; }
              .kusu-l { animation: open-left 0.6s ease-in forwards 1s; }
              .kusu-r { animation: open-right 0.6s ease-in forwards 1s; }
              .banner { animation: drop 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards 1s; }
            `}</style>
            
            <div className="w-1 h-20 bg-gray-300"></div>

            <div className="kusudama-container relative w-32 h-32 z-10">
              <div className="kusu-l absolute left-0 w-16 h-32 overflow-hidden origin-right">
                 <div className="absolute left-0 w-32 h-32 bg-gradient-to-br from-yellow-300 to-yellow-500 rounded-full border-4 border-yellow-600 shadow-inner"></div>
              </div>
              <div className="kusu-r absolute right-0 w-16 h-32 overflow-hidden origin-left">
                 <div className="absolute right-0 w-32 h-32 bg-gradient-to-bl from-yellow-400 to-yellow-600 rounded-full border-4 border-yellow-600 shadow-inner"></div>
              </div>

              <div className="banner absolute top-16 left-1/2 -translate-x-1/2 w-16 bg-white border-2 border-red-500 shadow-2xl flex flex-col items-center py-4 h-0 overflow-hidden z-[-1]">
                 <div className="flex flex-col items-center gap-1 text-red-600 font-extrabold text-2xl">
                   <span className="text-yellow-500 bg-red-600 px-1 rounded-sm mb-1 text-xl">祝</span>
                   <span>し</span><span>ん</span><span>き</span><span>ろ</span><span>く</span>
                 </div>
              </div>
            </div>
          </div>
          
          <div className="absolute bottom-10 text-white/70 font-bold animate-pulse">
            画面をタップしてスキップ
          </div>
        </div>
      );
    };

    // 記録保存関数
    const saveRecord = (type, level, mode, value, resultValue) => {
      const records = JSON.parse(localStorage.getItem('sansu_records') || '{}');
      if (!records[type]) records[type] = {};
      if (!records[type][level]) records[type][level] = {};
      
      const key = `${mode}_${value}`;
      const currentBest = records[type][level][key];
      
      let isNewRecord = false;

      if (mode === 'count') {
        if (currentBest === undefined || resultValue < currentBest) {
          records[type][level][key] = resultValue;
          isNewRecord = true;
        }
      } else if (mode === 'time') {
        if (currentBest === undefined || resultValue > currentBest) {
          records[type][level][key] = resultValue;
          isNewRecord = true;
        }
      }
      localStorage.setItem('sansu_records', JSON.stringify(records));
      return isNewRecord; 
    };

    // 全コース制覇ボーナスのチェックと適用関数
    const checkAndApplyAllClearBonus = (type, level) => {
      const records = JSON.parse(localStorage.getItem('sansu_records') || '{}');
      if (!records[type] || !records[type][level]) return 0;
      
      const currentLevelRecords = records[type][level];
      if (currentLevelRecords.all_cleared) return 0; 

      const requiredKeys = ['count_10', 'count_20', 'count_30', 'time_60', 'time_120', 'time_180'];
      const hasAll = requiredKeys.every(key => currentLevelRecords[key] !== undefined);
      
      if (hasAll) {
        currentLevelRecords.all_cleared = true;
        localStorage.setItem('sansu_records', JSON.stringify(records));
        return level * 100; 
      }
      return 0;
    };

    // ポイント加算関数
    const addPoints = (type, level, mode, value, pointsToAdd) => {
      const records = JSON.parse(localStorage.getItem('sansu_records') || '{}');
      if (!records[type]) records[type] = {};
      if (!records[type][level]) records[type][level] = {};
      
      const key = `${mode}_${value}_points`;
      const currentPoints = records[type][level][key] || 0;
      
      records[type][level][key] = currentPoints + pointsToAdd;
      localStorage.setItem('sansu_records', JSON.stringify(records));
    };

    // 問題生成関数
    const generateProblem = (type, level) => {
      let n1, n2, ans;
      switch (type) {
        case 'add':
          if (level === 1) { n1 = Math.floor(Math.random() * 9) + 1; n2 = Math.floor(Math.random() * 9) + 1; }
          else if (level === 2) { n1 = Math.floor(Math.random() * 90) + 10; n2 = Math.floor(Math.random() * 9) + 1; }
          else if (level === 3) { n1 = Math.floor(Math.random() * 90) + 10; n2 = Math.floor(Math.random() * 90) + 10; }
          else if (level === 4) { n1 = Math.floor(Math.random() * 900) + 100; n2 = Math.floor(Math.random() * 90) + 10; }
          else { n1 = Math.floor(Math.random() * 900) + 100; n2 = Math.floor(Math.random() * 900) + 100; }
          ans = n1 + n2;
          return { n1, n2, op: '+', ans };
        case 'sub':
          if (level === 1) { n1 = Math.floor(Math.random() * 9) + 2; n2 = Math.floor(Math.random() * (n1 - 1)) + 1; }
          else if (level === 2) { n1 = Math.floor(Math.random() * 90) + 10; n2 = Math.floor(Math.random() * 9) + 1; }
          else if (level === 3) { n1 = Math.floor(Math.random() * 90) + 10; n2 = Math.floor(Math.random() * (n1 - 1)) + 1; }
          else if (level === 4) { n1 = Math.floor(Math.random() * 900) + 100; n2 = Math.floor(Math.random() * 90) + 10; }
          else { n1 = Math.floor(Math.random() * 900) + 100; n2 = Math.floor(Math.random() * (n1 - 100)) + 100; }
          ans = n1 - n2;
          return { n1, n2, op: '-', ans };
        case 'mul':
          if (level === 1) { n1 = Math.floor(Math.random() * 5) + 1; n2 = Math.floor(Math.random() * 5) + 1; }
          else if (level === 2) { n1 = Math.floor(Math.random() * 9) + 1; n2 = Math.floor(Math.random() * 9) + 1; }
          else if (level === 3) { n1 = Math.floor(Math.random() * 10) + 10; n2 = Math.floor(Math.random() * 8) + 2; }
          else if (level === 4) { n1 = Math.floor(Math.random() * 80) + 20; n2 = Math.floor(Math.random() * 8) + 2; }
          else { n1 = Math.floor(Math.random() * 90) + 10; n2 = Math.floor(Math.random() * 90) + 10; }
          ans = n1 * n2;
          return { n1, n2, op: '×', ans };
        case 'div':
          if (level === 1) { n2 = Math.floor(Math.random() * 5) + 1; ans = Math.floor(Math.random() * 5) + 1; }
          else if (level === 2) { n2 = Math.floor(Math.random() * 9) + 1; ans = Math.floor(Math.random() * 9) + 1; }
          else if (level === 3) { n2 = Math.floor(Math.random() * 8) + 2; ans = Math.floor(Math.random() * 41) + 10; }
          else if (level === 4) { n2 = Math.floor(Math.random() * 8) + 2; ans = Math.floor(Math.random() * 89) + 11; }
          else { n2 = Math.floor(Math.random() * 90) + 10; ans = Math.floor(Math.random() * 90) + 10; }
          n1 = n2 * ans;
          return { n1, n2, op: '÷', ans };
        default:
          return { n1: 1, n2: 1, op: '+', ans: 2 };
      }
    };

    // ---------------------------------------------------------
    // 背景罫線コンポーネント
    // ---------------------------------------------------------
    const GridBackground = () => (
      <div className="absolute inset-0 pointer-events-none flex justify-end pr-2 sm:pr-4 md:pr-12 z-0">
        <div className="flex h-full border-r-2 border-amber-700/15">
          {Array.from({ length: 15 }).map((_, i) => (
            <div key={i} className="h-full w-8 sm:w-14 md:w-24 border-l-2 border-amber-700/15"></div>
          ))}
        </div>
      </div>
    );

    // ---------------------------------------------------------
    // 筆算（縦式）コンポーネント
    // ---------------------------------------------------------
    const VerticalMath = ({ problem }) => {
      const { n1, n2, op } = problem;
      
      if (op === '÷') {
        const n1Chars = String(n1).split('');
        const n2Chars = String(n2).split('');

        return (
          <div className="font-mono flex flex-col items-end w-full select-none pointer-events-none z-10 pt-6 md:pt-12 pr-2 sm:pr-4 md:pr-12">
            <div className="flex items-end text-4xl sm:text-5xl md:text-7xl font-bold text-gray-800">
              <div className="flex pb-[2px] md:pb-[3px] pr-1 md:pr-2">
                {n2Chars.map((c, i) => (
                  <div key={i} className="w-6 sm:w-8 md:w-12 flex justify-center leading-none">
                    {c}
                  </div>
                ))}
              </div>
              
              <div className="relative border-t-[3px] md:border-t-[4px] border-gray-800 pt-3 md:pt-4 px-2">
                <svg 
                  className="absolute top-[-3px] left-0 h-[calc(100%+3px)] w-6 -translate-x-full overflow-visible md:hidden"
                  viewBox="0 0 20 100" 
                  preserveAspectRatio="none"
                >
                  <path d="M 0,100 C 15,80 20,40 20,0" fill="none" stroke="#1f2937" strokeWidth="3" vectorEffect="non-scaling-stroke" />
                </svg>
                <svg 
                  className="absolute top-[-4px] left-0 h-[calc(100%+4px)] w-8 -translate-x-full overflow-visible hidden md:block"
                  viewBox="0 0 20 100" 
                  preserveAspectRatio="none"
                >
                  <path d="M 0,100 C 15,80 20,40 20,0" fill="none" stroke="#1f2937" strokeWidth="4" vectorEffect="non-scaling-stroke" />
                </svg>
                
                <div className="flex">
                  {n1Chars.map((c, i) => (
                    <div key={i} className="w-8 sm:w-10 md:w-16 flex justify-center leading-none">
                      {c}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      const n1Chars = String(n1).split('');
      const n2Chars = String(n2).split('');
      const maxLen = Math.max(n1Chars.length, n2Chars.length);
      
      const padChars = (chars, len) => {
        const padded = Array(len - chars.length).fill('');
        return [...padded, ...chars];
      };

      const paddedN1 = padChars(n1Chars, maxLen);
      const paddedN2 = padChars(n2Chars, maxLen);

      return (
        <div className="font-mono text-4xl sm:text-5xl md:text-7xl font-bold text-gray-800 flex flex-col items-end select-none pointer-events-none z-10 w-full pt-6 md:pt-12 pr-2 sm:pr-4 md:pr-12">
          <div className="flex w-full justify-end">
            <div className="flex">
              {paddedN1.map((c, i) => (
                <div key={`n1-${i}`} className="w-8 sm:w-14 md:w-24 flex justify-center leading-none">
                  {c}
                </div>
              ))}
            </div>
          </div>
          <div className="relative flex items-center justify-end w-full border-b-[3px] md:border-b-[4px] border-gray-800 pb-2 md:pb-4 mt-2 sm:mt-4 md:mt-6">
            <div className="absolute left-2 sm:left-6 md:left-10">{op}</div>
            <div className="flex">
              {paddedN2.map((c, i) => (
                <div key={`n2-${i}`} className="w-8 sm:w-14 md:w-24 flex justify-center leading-none">
                  {c}
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ---------------------------------------------------------
    // 手書きキャンバスコンポーネント
    // ---------------------------------------------------------
    const DrawCanvas = forwardRef(({ clearKey }, ref) => {
      const canvasRef = useRef(null);
      const isDrawing = useRef(false);
      const [size, setSize] = useState({ width: 0, height: 0 });
      
      const pathsRef = useRef([]);
      const currentPathRef = useRef(null);

      const redraw = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#4b5563';

        pathsRef.current.forEach(path => {
          if (path.points.length === 0) return;
          ctx.beginPath();
          ctx.moveTo(path.points[0].x, path.points[0].y);
          for (let i = 1; i < path.points.length; i++) {
            ctx.lineTo(path.points[i].x, path.points[i].y);
          }
          ctx.stroke();
        });
      }, []);

      useImperativeHandle(ref, () => ({
        clear: () => {
          pathsRef.current = [];
          redraw();
        },
        undo: () => {
          pathsRef.current.pop();
          redraw();
        }
      }));

      useEffect(() => {
        const updateSize = () => {
          if (canvasRef.current && canvasRef.current.parentElement) {
            const { width, height } = canvasRef.current.parentElement.getBoundingClientRect();
            setSize({ width, height });
          }
        };
        updateSize();
        const timer = setTimeout(updateSize, 100);
        window.addEventListener('resize', updateSize);
        return () => {
          clearTimeout(timer);
          window.removeEventListener('resize', updateSize);
        };
      }, []);

      useEffect(() => {
        pathsRef.current = [];
        redraw();
      }, [clearKey, size, redraw]);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
          return {
            x: e.touches[0].clientX - rect.left,
            y: e.touches[0].clientY - rect.top
          };
        }
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      };

      const startDrawing = (e) => {
        if (e.cancelable) e.preventDefault();
        isDrawing.current = true;
        const coords = getCoordinates(e);
        currentPathRef.current = { points: [coords] };
        pathsRef.current.push(currentPathRef.current);
        redraw();
      };

      const draw = (e) => {
        if (!isDrawing.current || !currentPathRef.current) return;
        if (e.cancelable) e.preventDefault();
        const coords = getCoordinates(e);
        currentPathRef.current.points.push(coords);
        redraw();
      };

      const stopDrawing = () => {
        isDrawing.current = false;
        currentPathRef.current = null;
      };

      return (
        <canvas
          ref={canvasRef}
          width={size.width}
          height={size.height}
          className="absolute inset-0 touch-none cursor-crosshair z-10"
          onMouseDown={startDrawing}
          onMouseMove={draw}
          onMouseUp={stopDrawing}
          onMouseLeave={stopDrawing}
          onTouchStart={startDrawing}
          onTouchMove={draw}
          onTouchEnd={stopDrawing}
          onTouchCancel={stopDrawing}
        />
      );
    });

    // ---------------------------------------------------------
    // ホーム画面
    // ---------------------------------------------------------
    const HomeView = ({ setType, setView }) => {
      const [dailyComment, setDailyComment] = useState('');
      const [typePoints, setTypePoints] = useState({ add: 0, sub: 0, mul: 0, div: 0 });

      useEffect(() => {
        const today = new Date();
        const todayStr = today.toDateString(); 
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toDateString();

        const lastVisit = localStorage.getItem('sansu_last_visit');
        let streakCount = parseInt(localStorage.getItem('sansu_streak_count') || '0', 10);

        if (lastVisit === todayStr) {
          // 訪問済み
        } else if (lastVisit === yesterdayStr) {
          streakCount += 1;
          localStorage.setItem('sansu_last_visit', todayStr);
          localStorage.setItem('sansu_streak_count', streakCount.toString());
        } else {
          streakCount = 1;
          localStorage.setItem('sansu_last_visit', todayStr);

    const QuizView = ({ type, level, course, setView, setResult }) => {
      const [problem, setProblem] = useState({ n1: 0, n2: 0, op: '+', ans: 0 });
      const [userInput, setUserInput] = useState('');
      const [status, setStatus] = useState('idle');
      const [score, setScore] = useState(0);
      
      const [countdown, setCountdown] = useState(3);
      const [startTime, setStartTime] = useState(null);
      const [now, setNow] = useState(null);
      const [mistakes, setMistakes] = useState(0);

      const [hint, setHint] = useState("");
      const [isHintLoading, setIsHintLoading] = useState(false);

      const isFinishedRef = useRef(false);
      const lastActionTimeRef = useRef(Date.now());
      const canvasRef = useRef(null);
      const [clearKey, setClearKey] = useState(Date.now());

      const theme = {
        add: { bg: 'bg-red-50', text: 'text-red-500', title: 'たしざん' },
        sub: { bg: 'bg-blue-50', text: 'text-blue-500', title: 'ひき算' },
        mul: { bg: 'bg-green-50', text: 'text-green-500', title: 'かけ算' },
        div: { bg: 'bg-purple-50', text: 'text-purple-500', title: 'わり算' },
      }[type];

      const handleGetHint = async () => {
        setIsHintLoading(true);
        const sysPrompt = "あなたは優しくて面白い、小学生向けの算数の先生です。ひらがなと簡単な漢字（小学3年生まで）を使って、フレンドリーに話してください。答えを直接教えるのではなく、考え方のヒントやコツを50文字以内で短く出してください。";
        const pText = `計算問題「${problem.n1} ${problem.op} ${problem.n2}」の解き方のヒントを教えてください。`;
        
        const response = await fetchGeminiContent(pText, sysPrompt);
        setHint(response);
        setIsHintLoading(false);
      };

      useEffect(() => {
        setProblem(generateProblem(type, level));
        setUserInput('');
        setStatus('idle');
        setScore(0);
        setCountdown(3);
        setStartTime(null);
        setNow(null);
        setMistakes(0);
        setClearKey(Date.now());
        setHint(""); 
        isFinishedRef.current = false;
        lastActionTimeRef.current = Date.now();
        
        const timer = setInterval(() => {
          setCountdown((prev) => {
            if (prev <= 1) {
              clearInterval(timer);
              const currentTime = Date.now();
              setStartTime(currentTime);
              setNow(currentTime);
              return null; 
            }
            return prev - 1;
          });
        }, 1000);
        
        return () => clearInterval(timer);
      }, [type, level, course]);

      useEffect(() => {
        const resetIdleTimer = () => {
          lastActionTimeRef.current = Date.now();
        };
        window.addEventListener('pointerdown', resetIdleTimer);
        window.addEventListener('keydown', resetIdleTimer);
        window.addEventListener('touchstart', resetIdleTimer);
        return () => {
          window.removeEventListener('pointerdown', resetIdleTimer);
          window.removeEventListener('keydown', resetIdleTimer);
          window.removeEventListener('touchstart', resetIdleTimer);
        };
      }, []);

      useEffect(() => {
        if (countdown !== null) return;
        const timer = setInterval(() => {
          const currentTime = Date.now();
          setNow(currentTime);

          if (!isFinishedRef.current && currentTime - lastActionTimeRef.current >= 5 * 60 * 1000) {
            isFinishedRef.current = true;
            setResult({ isGameOver: true, reason: 'timeout_idle', earnedPoints: 0 });
            setView('result');
          }
        }, 100);
        return () => clearInterval(timer);
      }, [countdown, setView, setResult]);

      const elapsedSec = startTime && now ? Math.floor((now - startTime) / 1000) : 0;
      const timeLeft = course.mode === 'time' ? Math.max(0, course.value - elapsedSec) : null;

      useEffect(() => {
        if (course.mode === 'time' && timeLeft === 0 && status !== 'correct' && !isFinishedRef.current) {
          isFinishedRef.current = true;
          
          if (score === 0) {
            setTimeout(() => {
              setResult({ isGameOver: true, reason: 'timeout_zero', earnedPoints: 0 });
              setView('result');
            }, 500);
            return;
          }
          
          const isNewRecord = saveRecord(type, level, 'time', course.value, score);
          
          let bonusPoints = 0;
          if (isNewRecord) {
            bonusPoints += 10 * level; 
            addPoints(type, level, 'time', course.value, 10 * level);
          }
          
          const allClearBonus = checkAndApplyAllClearBonus(type, level);
          if (allClearBonus > 0) {
            bonusPoints += allClearBonus;
            addPoints(type, level, 'time', course.value, allClearBonus);
          }

          let earnedPoints = (score * level) + bonusPoints;
          
          setResult({ score, mode: 'time', value: course.value, isNewRecord, earnedPoints });
          setView('result');
        }
      }, [timeLeft, course.mode, score, course.value, setView, setResult, status, type, level]);

      const handleInput = useCallback((numStr) => {
        if (countdown !== null) return;
        if (status === 'correct') return;
        setUserInput(prev => prev.length < 6 ? prev + numStr : prev);
      }, [status, countdown]);

      const handleDelete = useCallback(() => {
        if (countdown !== null) return;
        if (status === 'correct') return;
        setUserInput(prev => prev.slice(0, -1));
      }, [status, countdown]);

      const handleCheck = useCallback(() => {
        if (countdown !== null) return;
        if (!userInput || status === 'correct') return;
        
        if (parseInt(userInput) === problem.ans) {
          playCorrectSound();
          setStatus('correct');
          const newScore = score + 1;
          setScore(newScore);
          
          if (!isFinishedRef.current) {
            addPoints(type, level, course.mode, course.value, 1 * level); 
          }
          
          if (course.mode === 'count' && newScore >= course.value) {
            isFinishedRef.current = true;
            const finalTime = Math.floor((Date.now() - startTime) / 1000);
            setTimeout(() => {
              const isNewRecord = saveRecord(type, level, 'count', course.value, finalTime);
              
              let bonusPoints = 0;
              if (isNewRecord) {
                bonusPoints += 10 * level;
                addPoints(type, level, 'count', course.value, 10 * level);
              }
              
              const allClearBonus = checkAndApplyAllClearBonus(type, level);
              if (allClearBonus > 0) {
                bonusPoints += allClearBonus;
                addPoints(type, level, 'count', course.value, allClearBonus);
              }

              let earnedPoints = (newScore * level) + bonusPoints;
              
              setResult({ score: newScore, timeElapsed: finalTime, mode: 'count', value: course.value, isNewRecord, earnedPoints });
              setView('result');
            }, 750);
          } else {
            setTimeout(() => {
              setProblem(generateProblem(type, level));
              setUserInput('');
              setStatus('idle');
              setHint(""); 
              setClearKey(Date.now());
            }, 750);
          }
        } else {
          setStatus('wrong');
          setUserInput('');
          const newMistakes = mistakes + 1;
          setMistakes(newMistakes);
          if (newMistakes >= 3) {
            isFinishedRef.current = true;
            let earnedPoints = score * level;
            setTimeout(() => {
              setResult({ isGameOver: true, reason: 'mistakes', earnedPoints });
              setView('result');
            }, 500);
          } else {
            setTimeout(() => setStatus('idle'), 500);
          }
        }
      }, [userInput, status, problem.ans, type, level, countdown, score, course, startTime, setResult, setView, mistakes]);

      useEffect(() => {
        if (countdown === null && userInput && parseInt(userInput) === problem.ans && status !== 'correct') {
          handleCheck();
        }
      }, [userInput, problem.ans, status, handleCheck, countdown]);

      useEffect(() => {
        if (countdown !== null) return;
        const handleKeyDown = (e) => {
          if (e.key >= '0' && e.key <= '9') {
            handleInput(e.key);
          } else if (e.key === 'Backspace') {
            handleDelete();
          } else if (e.key === 'Enter') {
            handleCheck();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleInput, handleDelete, handleCheck, countdown]);

      const renderNumpad = () => (
        <div className="w-full max-w-sm grid grid-cols-3 gap-2 sm:gap-3 md:gap-4 px-1 sm:px-2 relative z-10">
          {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
            <button
              key={num}
              onClick={() => handleInput(num.toString())}
              disabled={countdown !== null}
              className={`bg-white text-xl sm:text-3xl font-bold text-gray-700 py-3 sm:py-4 md:py-6 rounded-xl sm:rounded-2xl transition-all ${countdown !== null ? 'opacity-50 cursor-not-allowed' : 'shadow-[0_4px_0_#e5e7eb] active:shadow-[0_0px_0_#e5e7eb] active:translate-y-[4px]'}`}
            >
              {num}
            </button>
          ))}
          <button
            onClick={handleDelete}
            disabled={countdown !== null}
            className={`bg-gray-200 text-sm sm:text-xl font-bold text-gray-700 py-3 sm:py-4 md:py-6 rounded-xl sm:rounded-2xl transition-all ${countdown !== null ? 'opacity-50 cursor-not-allowed' : 'shadow-[0_4px_0_#d1d5db] active:shadow-[0_0px_0_#d1d5db] active:translate-y-[4px]'}`}
          >
            けす
          </button>
          <button
            onClick={() => handleInput('0')}
            disabled={countdown !== null}
            className={`bg-white text-xl sm:text-3xl font-bold text-gray-700 py-3 sm:py-4 md:py-6 rounded-xl sm:rounded-2xl transition-all ${countdown !== null ? 'opacity-50 cursor-not-allowed' : 'shadow-[0_4px_0_#e5e7eb] active:shadow-[0_0px_0_#e5e7eb] active:translate-y-[4px]'}`}
          >
            0
          </button>
          <button
            onClick={handleCheck}
            disabled={!userInput || countdown !== null}
            className={`text-sm sm:text-xl font-bold py-3 sm:py-4 md:py-6 rounded-xl sm:rounded-2xl transition-all ${countdown !== null || !userInput ? 'bg-gray-300 text-gray-500 shadow-[0_4px_0_#9ca3af] cursor-not-allowed opacity-50' : 'bg-orange-500 text-white shadow-[0_4px_0_#c2410c] active:shadow-[0_0px_0_rgba(0,0,0,0.2)] active:translate-y-[4px]'}`}
          >
            こたえる
          </button>
        </div>
      );

      return (
        <div className={`flex flex-col min-h-screen ${theme.bg} font-sans`}>
          <div className="flex justify-between items-center p-4 bg-white shadow-sm relative z-50">
            <button 
              onClick={() => setView('course')}
              className="flex items-center gap-2 text-gray-500 hover:text-gray-800 font-bold px-4 py-2 rounded-lg hover:bg-gray-100 transition-colors"
            >
              <ArrowLeft className="w-5 h-5 inline-block" /> もどる
            </button>
            
            <div className="text-lg md:text-xl font-bold text-gray-700 hidden sm:block">
              {theme.title} <span className="text-sm text-gray-500 ml-2">Lv.{level}</span>
            </div>
            
            <div className="flex items-center gap-2 md:gap-4">
              <div className="flex items-center gap-0.5 text-red-400">
                {[...Array(3)].map((_, i) => (
                  <Heart key={i} className={`w-5 h-5 md:w-6 md:h-6 ${i < 3 - mistakes ? 'fill-current' : 'text-gray-200'} inline-block`} />
                ))}
              </div>
              {course.mode === 'time' && (
                <div className={`text-xl font-bold ${timeLeft !== null && timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-gray-600'}`}>
                  ⏳ {timeLeft !== null ? `${Math.floor(timeLeft / 60)}:${(timeLeft % 60).toString().padStart(2, '0')}` : '0:00'}
                </div>
              )}
              {course.mode === 'count' && (
                 <div className="text-xl font-bold text-gray-600">
                   ⏳ {Math.floor(elapsedSec / 60)}:{(elapsedSec % 60).toString().padStart(2, '0')}
                 </div>
              )}
              <div className="flex items-center gap-1 font-bold text-yellow-500 text-xl bg-yellow-50 px-3 py-1 rounded-full">
                <Star className="w-6 h-6 fill-current inline-block" /> 
                {course.mode === 'count' ? `${score}/${course.value}` : score}
              </div>
            </div>
          </div>

          <div className="flex-1 relative flex flex-col items-center justify-center p-2 sm:p-4 w-full">
            {countdown !== null && (
              <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-40 flex flex-col items-center justify-center rounded-3xl m-2 sm:m-4">
                <div key={countdown} className="text-8xl sm:text-9xl md:text-[200px] font-extrabold text-orange-500 animate-in zoom-in duration-300">
                  {countdown}
                </div>
                <div className="text-xl sm:text-2xl md:text-3xl mt-4 sm:mt-8 font-bold text-gray-600 animate-pulse">
                  じゅんびは いいかな？
                </div>
              </div>
            )}

            <div className="w-full h-full flex-1 bg-white rounded-xl sm:rounded-3xl shadow-lg relative overflow-hidden flex flex-row">
              
              {/* 左側: 横式の計算問題と答えの入力エリア・テンキー (50%) */}
              <div className="w-1/2 flex flex-col items-center justify-start p-2 sm:p-6 md:p-10 order-1 bg-white border-r-2 border-gray-100 z-10 overflow-y-auto relative">
                
                {status === 'correct' && (
                  <div className="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 animate-in zoom-in duration-200 pointer-events-none">
                    <Circle className="w-24 h-24 sm:w-32 sm:h-32 md:w-48 md:h-48 text-green-500/80 inline-block" strokeWidth={3} />
                  </div>
                )}
                {status === 'wrong' && (
                  <div className="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 animate-in zoom-in duration-200 pointer-events-none">
                    <X className="w-24 h-24 sm:w-32 sm:h-32 md:w-48 md:h-48 text-red-500/80 inline-block" strokeWidth={3} />
                  </div>
                )}

                <div className="text-3xl sm:text-5xl md:text-7xl font-bold text-center tracking-widest text-gray-800 flex justify-center items-center gap-1 sm:gap-3 md:gap-5 mt-auto pt-4">
                  <span>{problem.n1}</span>
                  <span className={theme.text}>{problem.op}</span>
                  <span>{problem.n2}</span>
                  <span className={theme.text}>=</span>
                </div>
                
                <div className="mt-4 sm:mt-8 flex justify-center">
                  <div className={`w-24 h-16 sm:w-40 sm:h-24 md:w-48 md:h-28 bg-gray-100 rounded-xl sm:rounded-2xl flex items-center justify-center text-4xl sm:text-6xl md:text-7xl font-bold shadow-inner ${userInput ? 'text-gray-800' : 'text-gray-300'} border-4 ${status === 'wrong' ? 'border-red-400 bg-red-50 text-red-500' : 'border-gray-200'}`}>
                    {userInput || '?'}
                  </div>
                </div>

                {/* AIヒントエリア */}
                <div className="mt-4 sm:mt-8 w-full flex flex-col items-center min-h-[60px]">
                  {!hint && !isHintLoading && (
                    <button 
                      onClick={handleGetHint} 
                      disabled={countdown !== null}
                      className="text-xs sm:text-sm md:text-base font-bold text-indigo-700 bg-indigo-100 hover:bg-indigo-200 py-2 px-3 sm:py-3 sm:px-6 rounded-full transition-colors flex items-center gap-1 sm:gap-2 shadow-sm border border-indigo-200 disabled:opacity-50"
                    >
                      <span className="hidden sm:inline">✨</span> AIヒント
                    </button>
                  )}
                  {isHintLoading && (
                    <div className="text-xs sm:text-sm md:text-base font-bold text-indigo-600 animate-pulse flex items-center gap-1 sm:gap-2">
                      <Star className="w-4 h-4 sm:w-5 sm:h-5 animate-spin text-yellow-500 inline-block" /> かんがえ中...
                    </div>
                  )}
                  {hint && (
                    <div className="bg-indigo-50 border-2 border-indigo-200 text-indigo-900 p-2 sm:p-4 rounded-xl sm:rounded-2xl text-xs sm:text-sm md:text-base font-medium relative animate-in fade-in slide-in-from-bottom-2 w-full text-left shadow-sm max-h-[120px] overflow-y-auto">
                      <div className="font-extrabold text-indigo-700 mb-1 flex items-center gap-1">
                        ✨ AIせんせい
                      </div>
                      {hint}
                    </div>
                  )}
                </div>

                {/* テンキー（全てのコースで左側に表示） */}
                <div className="mt-4 sm:mt-8 w-full flex justify-center mb-auto pb-4">
                  {renderNumpad()}
                </div>
              </div>

              {/* 右側: 筆算表示と手書きの書き込みエリア (50%) */}
              <div className="w-1/2 flex flex-col min-h-[300px] sm:min-h-[400px] h-full bg-amber-50 order-2 relative overflow-hidden">
                <div className="flex justify-between items-center p-2 sm:p-4 bg-amber-100 border-b border-amber-200 z-20">
                  <span className="text-xs sm:text-sm md:text-base font-bold text-amber-700/80 pl-1 sm:pl-2">かきこみ</span>
                  <div className="flex gap-1 sm:gap-2">
                    <button 
                      onClick={() => canvasRef.current?.undo()}
                      className="flex items-center gap-1 px-2 py-1 sm:px-4 sm:py-2 bg-white hover:bg-amber-50 text-amber-700 rounded-lg sm:rounded-xl font-bold text-xs sm:text-sm transition-colors shadow-sm border border-amber-200"
                      title="１つもどす"
                    >
                      <Undo className="w-3 h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 inline-block" /> <span className="hidden sm:inline">もどす</span>
                    </button>
                    <button 
                      onClick={() => canvasRef.current?.clear()}
                      className="flex items-center gap-1 px-2 py-1 sm:px-4 sm:py-2 bg-white hover:bg-amber-50 text-amber-700 rounded-lg sm:rounded-xl font-bold text-xs sm:text-sm transition-colors shadow-sm border border-amber-200"
                      title="かきこみをすべてけす"
                    >
                      <X className="w-3 h-3 sm:w-4 sm:h-4 md:w-5 md:h-5 inline-block" /> <span className="hidden sm:inline">けす</span>
                    </button>
                  </div>
                </div>
                
                <div className="relative w-full flex-1 flex flex-col items-center justify-start overflow-hidden">
                  <GridBackground />
                  <VerticalMath problem={problem} />
                  <DrawCanvas ref={canvasRef} clearKey={clearKey} />
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    };

    // ---------------------------------------------------------
    // 結果画面
    // ---------------------------------------------------------
    const ResultView = ({ result, type, level, setView }) => {
      const [showKusudama, setShowKusudama] = useState(result.isNewRecord && !result.isGameOver);

      const [praiseWord] = useState(() => {
        const words = ["おつかれさま！", "やったね！", "すごい！", "よくがんばったね！", "さすが！"];
        return words[Math.floor(Math.random() * words.length)];
      });

      const theme = {
        add: { bg: 'bg-red-50', text: 'text-red-600', border: 'border-red-200', btn: 'bg-red-500 hover:bg-red-600 shadow-[0_6px_0_#991b1b]', title: 'たしざん' },
        sub: { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-200', btn: 'bg-blue-500 hover:bg-blue-600 shadow-[0_6px_0_#1e40af]', title: 'ひき算' },
        mul: { bg: 'bg-green-50', text: 'text-green-600', border: 'border-green-200', btn: 'bg-green-500 hover:bg-green-600 shadow-[0_6px_0_#166534]', title: 'かけ算' },
        div: { bg: 'bg-purple-50', text: 'text-purple-600', border: 'border-purple-200', btn: 'bg-purple-500 hover:bg-purple-600 shadow-[0_6px_0_#5b21b6]', title: 'わり算' },
      }[type];

      useEffect(() => {
        if (result.isNewRecord && !result.isGameOver) {
          const audio = new Audio('https://actions.google.com/sounds/v1/crowds/light_applause.ogg');
          audio.volume = 0.5;
          audio.play().catch(e => console.log('Audio play error:', e));
          
          const timer = setTimeout(() => setShowKusudama(false), 8000);
          return () => {
            clearTimeout(timer);
            audio.pause();
          };
        }
      }, [result.isNewRecord, result.isGameOver]);

      return (
        <div className={`flex flex-col items-center justify-center min-h-screen ${theme.bg} p-6 animate-in fade-in duration-500`}>
          
          {showKusudama && <Kusudama onClick={() => setShowKusudama(false)} />}

          <div className={`relative bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg text-center border-4 ${theme.border}`}>
            
            {result.isGameOver ? (
              <React.Fragment>
                <div className="flex justify-center mb-4">
                  <X className="w-24 h-24 text-red-500 inline-block" strokeWidth={3} />
                </div>
                <h2 className={`text-3xl md:text-4xl font-extrabold text-red-500 mb-2`}>ざんねん…</h2>
                <p className="text-gray-500 font-bold mb-4">{theme.title} - Lv.{level}</p>
                
                <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                  <p className="text-xl md:text-2xl font-bold text-gray-700 mb-2">
                    {result.reason === 'timeout_zero' ? 'じかんぎれに なっちゃったね' : 
                     result.reason === 'timeout_idle' ? 'おやすみ中かな？' :
                     '3かい まちがえちゃったね'}
                  </p>
                  <p className="text-lg text-gray-600">つぎは がんばろう！</p>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                {result.isNewRecord && (
                  <div className="absolute -top-6 -right-4 md:-top-8 md:-right-8 bg-gradient-to-r from-pink-500 to-red-500 text-white font-extrabold text-xl md:text-2xl py-2 px-6 rounded-full shadow-lg transform rotate-12 animate-in zoom-in duration-500 delay-1000 z-10">
                    🎊 しんきろく！
                  </div>
                )}

                <div className="flex justify-center mb-4">
                  <Award className={`w-20 h-20 ${theme.text} inline-block`} />
                </div>
                <h2 className={`text-3xl md:text-4xl font-extrabold ${theme.text} mb-2`}>{praiseWord}</h2>
                <p className="text-gray-500 font-bold mb-4">{theme.title} - Lv.{level}</p>
                
                {result.mode === 'count' ? (
                  <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                    <p className="text-2xl font-bold text-gray-700 mb-4">{result.value}問 せいかい！</p>
                    <p className="text-lg text-gray-600 flex items-center justify-center gap-2">
                      ⏳ かかったじかん
                    </p>
                    <p className="text-4xl font-extrabold text-gray-800 mt-2">
                      {Math.floor(result.timeElapsed / 60)}分{(result.timeElapsed % 60).toString().padStart(2, '0')}秒
                    </p>
                  </div>
                ) : (
                  <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                    <p className="text-xl font-bold text-gray-600 mb-4">{result.value / 60}分間 コース</p>
                    <p className="text-lg text-gray-600 flex items-center justify-center gap-2">
                      せいかいした かず
                    </p>
                    <p className="text-5xl font-extrabold text-yellow-500 mt-2 flex justify-center items-center gap-2">
                      <Star className="w-10 h-10 fill-current inline-block" /> {result.score} 問
                    </p>
                  </div>
                )}
              </React.Fragment>
            )}

            {(result.earnedPoints > 0) && (
              <div className="flex justify-center mb-6 animate-in slide-in-from-bottom-4 duration-500 delay-300">
                 <div className="bg-yellow-100 border-2 border-yellow-300 text-yellow-700 px-6 py-2 rounded-full font-bold text-lg md:text-xl flex items-center gap-2 shadow-sm">
                   <Star className="w-6 h-6 fill-yellow-500 text-yellow-500 inline-block" />
                   {result.earnedPoints} pt ゲット！
                 </div>
              </div>
            )}

            <div className="flex flex-col gap-4 relative z-10">
              <button 
                onClick={() => setView('quiz')}
                className={`relative ${theme.btn} text-white text-xl font-bold py-4 px-8 rounded-2xl active:translate-y-[6px] transition-all`}
              >
                もう1回やる
              </button>
              <button 
                onClick={() => setView('course')}
                className="bg-gray-200 hover:bg-gray-300 text-gray-700 text-lg font-bold py-4 px-8 rounded-2xl shadow-[0_6px_0_#9ca3af] active:shadow-[0_0px_0_#9ca3af] active:translate-y-[6px] transition-all flex items-center justify-center gap-2"
              >
                <ArrowLeft className="w-5 h-5 inline-block" /> もどる
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ---------------------------------------------------------
    // メインアプリケーション
    // ---------------------------------------------------------
    function App() {
      const [view, setView] = useState('home');
      const [type, setType] = useState('add');
      const [level, setLevel] = useState(1);
      const [course, setCourse] = useState({ mode: 'count', value: 10 });
      const [result, setResult] = useState(null);

      return (
        <div className="min-h-screen bg-gray-50 selection:bg-yellow-200 overflow-x-hidden">
          {view === 'home' && <HomeView setType={setType} setView={setView} />}
          {view === 'level' && <LevelView type={type} setView={setView} setLevel={setLevel} />}
          {view === 'course' && <CourseView type={type} level={level} setView={setView} setCourse={setCourse} />}
          {view === 'quiz' && <QuizView type={type} level={level} course={course} setView={setView} setResult={setResult} />}
          {view === 'result' && <ResultView result={result} type={type} level={level} setView={setView} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
