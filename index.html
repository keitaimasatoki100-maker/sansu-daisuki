      const [showKusudama, setShowKusudama] = useState(result.isNewRecord && !result.isGameOver);

      const [praiseWord] = useState(() => {
        const words = ["おつかれさま！", "やったね！", "すごい！", "よくがんばったね！", "さすが！"];
        return words[Math.floor(Math.random() * words.length)];
      });

      const theme = {
        add: { bg: 'bg-red-50', text: 'text-red-600', border: 'border-red-200', btn: 'bg-red-500 hover:bg-red-600 shadow-[0_6px_0_#991b1b]', title: 'たしざん' },
        sub: { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-200', btn: 'bg-blue-500 hover:bg-blue-600 shadow-[0_6px_0_#1e40af]', title: 'ひき算' },
        mul: { bg: 'bg-green-50', text: 'text-green-600', border: 'border-green-200', btn: 'bg-green-500 hover:bg-green-600 shadow-[0_6px_0_#166534]', title: 'かけ算' },
        div: { bg: 'bg-purple-50', text: 'text-purple-600', border: 'border-purple-200', btn: 'bg-purple-500 hover:bg-purple-600 shadow-[0_6px_0_#5b21b6]', title: 'わり算' },
        approx: { bg: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-200', btn: 'bg-orange-500 hover:bg-orange-600 shadow-[0_6px_0_#c2410c]', title: 'がい数' },
        number_line: { bg: 'bg-pink-50', text: 'text-pink-600', border: 'border-pink-200', btn: 'bg-pink-500 hover:bg-pink-600 shadow-[0_6px_0_#be185d]', title: '数直線' },
        length: { bg: 'bg-teal-50', text: 'text-teal-600', border: 'border-teal-200', btn: 'bg-teal-500 hover:bg-teal-600 shadow-[0_6px_0_#0f766e]', title: '長さ' },
        unit: { bg: 'bg-cyan-50', text: 'text-cyan-600', border: 'border-cyan-200', btn: 'bg-cyan-500 hover:bg-cyan-600 shadow-[0_6px_0_#0891b2]', title: '単位' },
        word_problem: { bg: 'bg-indigo-50', text: 'text-indigo-600', border: 'border-indigo-200', btn: 'bg-indigo-500 hover:bg-indigo-600 shadow-[0_6px_0_#4338ca]', title: '文章問題' }
      }[type];

      useEffect(() => {
        if (result.isNewRecord && !result.isGameOver) {
          const audio = new Audio('https://actions.google.com/sounds/v1/crowds/light_applause.ogg');
          audio.volume = 0.5;
          audio.play().catch(e => console.log('Audio play error:', e));
          
          const timer = setTimeout(() => setShowKusudama(false), 8000);
          return () => {
            clearTimeout(timer);
            audio.pause();
          };
        }
      }, [result.isNewRecord, result.isGameOver]);

      return (
        <div className={`flex flex-col items-center justify-center min-h-screen ${theme.bg} p-6 animate-in fade-in duration-500`}>
          
          {showKusudama && <Kusudama onClick={() => setShowKusudama(false)} />}

          <div className={`relative bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg text-center border-4 ${theme.border}`}>
            
            {result.isGameOver ? (
              <React.Fragment>
                <div className="flex justify-center mb-4">
                  <X className="w-24 h-24 text-red-500 inline-block" strokeWidth={3} />
                </div>
                <h2 className={`text-3xl md:text-4xl font-extrabold text-red-500 mb-2`}>ざんねん…</h2>
                <p className="text-gray-500 font-bold mb-4">{theme.title} - Lv.{level}</p>
                
                <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                  <p className="text-xl md:text-2xl font-bold text-gray-700 mb-2">
                    {result.reason === 'timeout_zero' ? 'じかんぎれに なっちゃったね' : 
                     result.reason === 'timeout_idle' ? 'おやすみ中かな？' :
                     '3かい まちがえちゃったね'}
                  </p>
                  <p className="text-lg text-gray-600">つぎは がんばろう！</p>
                </div>
              </React.Fragment>
            ) : (
              <React.Fragment>
                {result.isNewRecord && (
                  <div className="absolute -top-6 -right-4 md:-top-8 md:-right-8 bg-gradient-to-r from-pink-500 to-red-500 text-white font-extrabold text-xl md:text-2xl py-2 px-6 rounded-full shadow-lg transform rotate-12 animate-in zoom-in duration-500 delay-1000 z-10">
                    🎊 しんきろく！
                  </div>
                )}

                <div className="flex justify-center mb-4">
                  <Award className={`w-20 h-20 ${theme.text} inline-block`} />
                </div>
                <h2 className={`text-3xl md:text-4xl font-extrabold ${theme.text} mb-2`}>{praiseWord}</h2>
                <p className="text-gray-500 font-bold mb-4">{theme.title} - Lv.{level}</p>
                
                {result.mode === 'count' ? (
                  <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                    <p className="text-2xl font-bold text-gray-700 mb-4">{result.value}問 せいかい！</p>
                    <p className="text-lg text-gray-600 flex items-center justify-center gap-2">
                      ⏳ かかったじかん
                    </p>
                    <p className="text-4xl font-extrabold text-gray-800 mt-2">
                      {Math.floor(result.timeElapsed / 60)}分{(result.timeElapsed % 60).toString().padStart(2, '0')}秒
                    </p>
                  </div>
                ) : (
                  <div className="bg-gray-50 rounded-2xl p-6 mb-6 border-2 border-gray-100">
                    <p className="text-xl font-bold text-gray-600 mb-4">{result.value / 60}分間 コース</p>
                    <p className="text-lg text-gray-600 flex items-center justify-center gap-2">
                      せいかいした かず
                    </p>
                    <p className="text-5xl font-extrabold text-yellow-500 mt-2 flex justify-center items-center gap-2">
                      <Star className="w-10 h-10 fill-current inline-block" /> {result.score} 問
                    </p>
                  </div>
                )}
              </React.Fragment>
            )}

            {(result.earnedPoints > 0) && (
              <div className="flex justify-center mb-6 animate-in slide-in-from-bottom-4 duration-500 delay-300">
                 <div className="bg-yellow-100 border-2 border-yellow-300 text-yellow-700 px-6 py-2 rounded-full font-bold text-lg md:text-xl flex items-center gap-2 shadow-sm">
                   <Star className="w-6 h-6 fill-yellow-500 text-yellow-500 inline-block" />
                   {result.earnedPoints} pt ゲット！
                 </div>
              </div>
            )}

            <div className="flex flex-col gap-4 relative z-10">
              <button 
                onClick={() => setView('quiz')}
                className={`relative ${theme.btn} text-white text-xl font-bold py-4 px-8 rounded-2xl active:translate-y-[6px] transition-all`}
              >
                もう1回やる
              </button>
              <button 
                onClick={() => setView('course')}
                className="bg-gray-200 hover:bg-gray-300 text-gray-700 text-lg font-bold py-4 px-8 rounded-2xl shadow-[0_6px_0_#9ca3af] active:shadow-[0_0px_0_#9ca3af] active:translate-y-[6px] transition-all flex items-center justify-center gap-2"
              >
                <ArrowLeft className="w-5 h-5 inline-block" /> もどる
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ---------------------------------------------------------
    // プリント印刷画面
    // ---------------------------------------------------------
    const PrintView = ({ setView }) => {
      const [grade, setGrade] = useState(1);
      const [unit, setUnit] = useState('add');
      const [problems, setProblems] = useState([]);
      const [showPrintMessage, setShowPrintMessage] = useState(false);

      const isTwoCols = ['add', 'sub', 'mul', 'div', 'unit'].includes(unit);

      const generatePrint = useCallback(() => {
        const problemCount = isTwoCols ? 20 : 10;
        const newProbs = [];
        for(let i = 0; i < problemCount; i++) {
          newProbs.push(generateProblem(unit, grade));
        }
        setProblems(newProbs);
      }, [grade, unit, isTwoCols]);

      useEffect(() => {
        generatePrint();
      }, [generatePrint]);

      const unitLabels = { 
        add: 'たしざん', sub: 'ひき算', mul: 'かけ算', div: 'わり算', approx: 'がい数',
        number_line: '数直線', length: '長さ', unit: '単位', word_problem: '文章問題' 
      };

      const handlePrint = () => {
        try {
          const printContent = document.getElementById('print-area').innerHTML;
          const printWindow = window.open('', '_blank');
          if (printWindow) {
            printWindow.document.write(`
              <!DOCTYPE html>
              <html>
                <head>
                  <title>プリント印刷 - さんすうドリル</title>
                  <script src="https://cdn.tailwindcss.com"><\/script>
                  <style>
                    body { font-family: sans-serif; background-color: white; }
                    @media print {
                      @page { margin: 10mm; }
                      .page-break { page-break-before: always; }
                    }
                    .page-break { page-break-before: always; }
                  </style>
                </head>
                <body>
                  <div style="max-width: 210mm; margin: 0 auto; color: black; padding: 20px;">
                    ${printContent}
                  </div>
                  <script>
                    setTimeout(() => {
                      window.print();
                      window.close();
                    }, 1000);
                  <\/script>
                </body>
              </html>
            `);
            printWindow.document.close();
            return; 
          }
        } catch (error) {
          console.error("ポップアップでの印刷に失敗しました:", error);
        }

        try {
          window.print();
        } catch (error) {
          console.error("window.print() がブロックされました:", error);
        }
        
        setShowPrintMessage(true);
        setTimeout(() => setShowPrintMessage(false), 10000);
      };

      const renderPrintAnswer = (p) => {
        if (p.op === '文章問題') {
          return (
             <div className="flex flex-col gap-1 text-lg">
               <span className="text-gray-600 font-normal text-sm">式: {p.equation}</span>
               <span>答え: {p.ans}</span>
             </div>
          );
        } else if (p.answerType === 'fraction_proper' || p.answerType === 'fraction_improper') {
          return (
            <div className="flex flex-col items-center inline-flex align-middle text-lg">
              <span>{p.ansNum}</span>
              <div className="w-6 border-b-2 border-black my-0.5"></div>
              <span>{p.ansDen}</span>
            </div>
          );
        } else if (p.answerType === 'fraction_mixed') {
          return (
            <div className="flex items-center inline-flex align-middle gap-1 text-lg">
              <span>{p.ansInt}</span>
              <div className="flex flex-col items-center">
                <span>{p.ansNum}</span>
                <div className="w-6 border-b-2 border-black my-0.5"></div>
                <span>{p.ansDen}</span>
              </div>
            </div>
          );
        } else if (p.answerType === 'integer' || (!p.answerType && !['長さ', '単位', '文章問題', 'がい数', '数直線'].includes(p.op))) {
          return p.rem !== undefined ? <span>{p.ans} あまり {p.rem}</span> : <span>{p.ans}</span>;
        } else if (p.answerType === 'length_cm') {
          return <span>{p.ansCm} cm</span>;
        } else if (p.answerType === 'length_mm') {
          return <span>{p.ansMm} mm</span>;
        } else if (p.answerType === 'length_cm_mm') {
          return <span>{p.ansCm} cm {p.ansMm} mm</span>;
        } else if (p.answerType === 'unit_large') {
          return <span>{p.ans1} {p.unitLarge}</span>;
        } else if (p.answerType === 'unit_small' || p.answerType === 'unit_small_from_composite') {
          return <span>{p.ans1} {p.unitSmall}</span>;
        } else if (p.answerType === 'unit_composite_from_small') {
          return <span>{p.ans1} {p.unitLarge} {p.ans2} {p.unitSmall}</span>;
        } else if (p.answerType === 'approx_range') {
          return <span className="text-xl">{p.ans1} 以上、 {p.ans2} 未満</span>;
        } else if (p.op === '数直線') {
          if (p.answerType === 'decimal') {
             return <span>{p.ans}</span>;
          }
          if (p.answerType === 'fraction_proper' || p.answerType === 'fraction_improper') {
            return (
              <div className="flex flex-col items-center inline-flex align-middle text-lg">
                <span>{p.ansNum}</span>
                <div className="w-6 border-b-2 border-black my-0.5"></div>
                <span>{p.ansDen}</span>
              </div>
            );
          } else if (p.answerType === 'fraction_mixed') {
            if (p.ansInt > 0 && p.ansNum > 0) {
              return (
                <div className="flex items-center inline-flex align-middle gap-1 text-lg">
                  <span>{p.ansInt}</span>
                  <div className="flex flex-col items-center">
                    <span>{p.ansNum}</span>
                    <div className="w-6 border-b-2 border-black my-0.5"></div>
                    <span>{p.ansDen}</span>
                  </div>
                </div>
              );
            }
            if (p.ansInt > 0) return <span>{p.ansInt}</span>;
            return (
              <div className="flex flex-col items-center inline-flex align-middle text-lg">
                <span>{p.ansNum}</span>
                <div className="w-6 border-b-2 border-black my-0.5"></div>
                <span>{p.ansDen}</span>
              </div>
            );
          }
          return <span>{p.ans}</span>;
        }
        return <span>{p.ans}</span>;
      };

      return (
        <div className="min-h-screen bg-white">
          {showPrintMessage && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] font-bold text-center w-11/12 max-w-2xl animate-in fade-in slide-in-from-top-4 border-4 border-blue-400">
              <p className="text-lg md:text-xl mb-2">🖨️ 印刷画面が開かない場合</p>
              <p className="text-sm md:text-base font-normal">
                セキュリティ設定により自動で開けないことがあります。<br/>
                キーボードの <span className="bg-blue-800 px-2 py-1 rounded">Ctrl</span> + <span className="bg-blue-800 px-2 py-1 rounded">P</span> (Macは <span className="bg-blue-800 px-2 py-1 rounded">Cmd</span> + <span className="bg-blue-800 px-2 py-1 rounded">P</span>) を押すか、<br/>
                ブラウザのメニューから「印刷」を選んでください。
              </p>
            </div>
          )}

          {/* コントロールエリア（印刷時は非表示） */}
          <div className="print:hidden p-4 md:p-8 bg-stone-100 border-b-4 border-stone-200 sticky top-0 z-50">
            <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <button 
                onClick={() => setView('home')} 
                className="font-bold text-gray-600 flex items-center gap-2 hover:bg-gray-200 px-4 py-2 rounded-xl transition-colors"
              >
                <ArrowLeft className="w-5 h-5 inline-block"/> もどる
              </button>
              
              <div className="flex flex-wrap gap-3 items-center justify-center">
                <select value={unit} onChange={(e) => setUnit(e.target.value)} className="p-2 md:p-3 rounded-xl font-bold border-2 border-stone-300 outline-none focus:border-stone-500">
                  {Object.entries(unitLabels).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                </select>
                <select value={grade} onChange={(e) => setGrade(Number(e.target.value))} className="p-2 md:p-3 rounded-xl font-bold border-2 border-stone-300 outline-none focus:border-stone-500">
                  <option value={1}>レベル1</option>
                  <option value={2}>レベル2</option>
                  <option value={3}>レベル3</option>
                  <option value={4}>レベル4</option>
                  <option value={5}>レベル5</option>
                </select>
                <button 
                  onClick={generatePrint} 
                  className="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 md:py-3 rounded-xl font-bold shadow-[0_4px_0_#1d4ed8] active:shadow-[0_0px_0_#1d4ed8] active:translate-y-[4px] transition-all"
                >
                  問題をかえる
                </button>
                <button 
                  onClick={handlePrint} 
                  className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 md:py-3 rounded-xl font-bold shadow-[0_4px_0_#15803d] active:shadow-[0_0px_0_#15803d] active:translate-y-[4px] transition-all flex items-center gap-2"
                >
                  🖨️ 印刷する
                </button>
              </div>
            </div>
          </div>

          {/* 印刷エリア */}
          <div id="print-area" className="p-8 max-w-[210mm] mx-auto text-black bg-white">
            
            {/* --- 表面（問題） --- */}
            <div>
              {/* 行の一番上に学年と単元名 */}
              <div className="flex justify-between items-start mb-6">
                <h1 className="text-2xl font-bold border-b-2 border-black pb-1 w-full text-left">
                  レベル{grade} さんすう - {unitLabels[unit]}
                </h1>
              </div>
              
              {/* 名前欄（左右に1文字分・1行分の十分な余白） */}
              <div className="flex justify-end mb-12 mx-8">
                <div className="flex items-end text-xl">
                  <span className="mr-4 tracking-widest font-bold">なまえ</span>
                  <div className="w-72 border-b-2 border-black h-8 relative"></div>
                </div>
              </div>

              {/* 問題一覧 */}
              <div className={`grid ${isTwoCols ? 'grid-cols-2 gap-x-8 gap-y-6 md:gap-y-8' : 'grid-cols-1 gap-y-12'} text-xl font-bold pb-8`}>
                {problems.map((p, i) => (
                  <div key={i} className={`flex ${isTwoCols ? 'gap-2' : 'gap-4'} items-start break-inside-avoid`}>
                    <span className="w-12 shrink-0 text-right">({i+1})</span>
                    
                    {(p.op === '文章問題' || p.op === 'がい数') ? (
                      <div className="flex flex-col gap-6 flex-1">
                        <span className="whitespace-pre-wrap leading-relaxed">{p.text}</span>
                        {p.op === '文章問題' && (
                          <div className="flex items-center gap-4 mt-2">
                            <span>式:</span>
                            <div className="flex-1 border-b border-gray-400"></div>
                          </div>
                        )}
                        <div className="flex items-center gap-4 justify-end mt-2 pr-12">
                          <span>答え:</span>
                          {p.answerType === 'approx_range' ? (
                             <div className="flex items-center gap-2">
                               <div className="w-24 border-b border-gray-400"></div>
                               <span>以上、</span>
                               <div className="w-24 border-b border-gray-400"></div>
                               <span>未満</span>
                             </div>
                          ) : (
                             <div className="w-40 border-b border-gray-400"></div>
                          )}
                        </div>
                      </div>
                    ) : p.op === '長さ' ? (
                      <div className="flex flex-col gap-6 flex-1">
                         <RulerSVG totalMm={p.ansTotalMm} maxCm={p.maxCm} />
                         <div className="flex items-center gap-4 justify-end mt-2 pr-12">
                           <span>答え:</span>
                           <div className="w-40 border-b border-gray-400"></div>
                         </div>
                      </div>
                    ) : p.op === '単位' ? (
                      <div className="flex items-center gap-4 flex-1 pr-8">
                        <span className="tracking-widest">
                          {p.answerType === 'unit_m' || p.answerType === 'unit_large' ? `${p.q_total_cm || p.q_total_small}${p.unitSmall || 'cm'} =` : 
                           p.answerType === 'unit_cm' || p.answerType === 'unit_small' ? `${p.q_m || p.q_large}${p.unitLarge || 'm'} =` : 
                           p.answerType === 'unit_cm_from_m_cm' || p.answerType === 'unit_small_from_composite' ? `${p.q_m || p.q_large}${p.unitLarge || 'm'} ${p.q_cm || p.q_small}${p.unitSmall || 'cm'} = ${m.ans1}${m.unitSmall || 'cm'}` : 
                           `${p.q_total_cm || p.q_total_small}${p.unitSmall || 'cm'} = ${m.ans1}${m.unitLarge || 'm'} ${m.ans2}${m.unitSmall || 'cm'}`
                           }
                        </span>
                        <div className="flex-1 border-b border-gray-400"></div>
                      </div>
                    ) : p.op === '数直線' ? (
                      <div className="flex flex-col gap-6 flex-1">
                        <svg width="100%" height="160" viewBox="0 0 1000 160" className="overflow-visible mt-4">
                          <line x1="40" y1="80" x2="960" y2="80" stroke="#000" strokeWidth="4" strokeLinecap="round" />
                          <polygon points="960,70 980,80 960,90" fill="#000" />
                          {p.labels && p.labels.map((label, j) => {
                            const x = 80 + (840 / (p.count - 1)) * j;
                            return (
                              <g key={j}>
                                <line x1={x} y1="60" x2={x} y2="100" stroke="#000" strokeWidth="3" strokeLinecap="round" />
                                {typeof label === 'object' ? (
                                    label.int > 0 ? (
                                      <g>
                                        <text x={x-20} y="150" textAnchor="middle" fontSize="32" fontWeight="bold" fill="#000">{label.int}</text>
                                        <text x={x+15} y="135" textAnchor="middle" fontSize="24" fontWeight="bold" fill="#000">{label.num}</text>
                                        <line x1={x} y1="142" x2={x+30} y2="142" stroke="#000" strokeWidth="2" />
                                        <text x={x+15} y="170" textAnchor="middle" fontSize="24" fontWeight="bold" fill="#000">{label.den}</text>
                                      </g>
                                    ) : (
                                      <g>
                                        <text x={x} y="135" textAnchor="middle" fontSize="24" fontWeight="bold" fill="#000">{label.num}</text>
                                        <line x1={x-15} y1="142" x2={x+15} y2="142" stroke="#000" strokeWidth="2" />
                                        <text x={x} y="170" textAnchor="middle" fontSize="24" fontWeight="bold" fill="#000">{label.den}</text>
                                      </g>
                                    )
                                ) : (
                                    <text x={x} y="140" textAnchor="middle" fontSize={label === '?' ? "48" : "32"} fontWeight="bold" fill="#000">
                                      {label === '?' ? '(   )' : label}
                                    </text>
                                )}
                              </g>
                            );
                          })}
                        </svg>
                      </div>
                    ) : (
                      <div className="flex items-center gap-4 flex-1 pr-8">
                        <span className="tracking-widest text-2xl">{p.n1} {p.op} {p.n2} = </span>
                        <div className="flex-1 border-b border-gray-400"></div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* --- 裏面（解答） --- */}
            <div className="page-break pt-8">
              <div className="flex justify-between items-start mb-8 px-8 max-w-[210mm] mx-auto text-black bg-white">
                <h1 className="text-2xl font-bold border-b-2 border-black pb-1 w-full text-left">
                  レベル{grade} さんすう - {unitLabels[unit]} 【こたえ】
                </h1>
              </div>
              
              <div className={`grid ${isTwoCols ? 'grid-cols-2 gap-x-8 gap-y-6 md:gap-y-8' : 'grid-cols-1 gap-y-8'} text-xl font-bold pb-8 px-8 max-w-[210mm] mx-auto text-black bg-white`}>
                {problems.map((p, i) => (
                  <div key={i} className={`flex ${isTwoCols ? 'gap-2' : 'gap-4'} items-start break-inside-avoid`}>
                    <span className="w-12 shrink-0 text-right">({i+1})</span>
                    <div className="flex-1 flex flex-wrap items-center">
                      {renderPrintAnswer(p)}
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('home');
      const [type, setType] = useState('add');
      const [level, setLevel] = useState(1);
      const [course, setCourse] = useState({ mode: 'count', value: 10 });
      const [result, setResult] = useState(null);

      return (
        <div className="min-h-screen bg-gray-50 selection:bg-yellow-200 overflow-x-hidden">
          {view === 'home' && <HomeView setType={setType} setView={setView} />}
          {view === 'level' && <LevelView type={type} setView={setView} setLevel={setLevel} />}
          {view === 'course' && <CourseView type={type} level={level} setView={setView} setCourse={setCourse} />}
          {view === 'quiz' && <QuizView type={type} level={level} course={course} setView={setView} setResult={setResult} />}
          {view === 'result' && <ResultView result={result} type={type} level={level} setView={setView} />}
          {view === 'records' && <RecordsView setView={setView} />}
          {view === 'print' && <PrintView setView={setView} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
